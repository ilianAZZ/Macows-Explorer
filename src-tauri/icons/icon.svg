<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Folder gradient: sky blue → Apple blue → deep navy -->
    <linearGradient id="g" x1="256" y1="48" x2="256" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5AD4FF"/>
      <stop offset="42%"  stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#003BB8"/>
    </linearGradient>

    <!-- Liquid-glass shine: spans the whole folder top → mid -->
    <linearGradient id="s" x1="256" y1="48" x2="256" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Entire folder as ONE path — tab and body unified, no anti-alias seam.
       Trace: tab top-left corner → tab top → tab top-right → tab right side →
              body top (right of tab) → body top-right → body right → body bottom-right →
              body bottom → body bottom-left → left side back to start (via Z). -->
  <path d="M44 76
           Q44 48 72 48
           L192 48
           Q220 48 228 76
           L228 104
           L424 104
           Q468 104 468 148
           L468 428
           Q468 472 424 472
           L88 472
           Q44 472 44 428
           Z"
        fill="url(#g)"/>

  <!-- Liquid-glass shine overlay (same outline) -->
  <path d="M44 76
           Q44 48 72 48
           L192 48
           Q220 48 228 76
           L228 104
           L424 104
           Q468 104 468 148
           L468 428
           Q468 472 424 472
           L88 472
           Q44 472 44 428
           Z"
        fill="url(#s)"/>

  <!-- Explorer ">" chevron -->
  <path d="M204 218 L320 292 L204 366"
        stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="0.85"/>
</svg>
