name: Commitlint

# Authoritative Conventional Commits check. Every commit in a PR must follow the
# convention (see commitlint.config.cjs) so release-please can compute the next
# version + changelog. The local .githooks/commit-msg hook gives the same check
# while you commit; this is the gate that can't be bypassed with --no-verify.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
