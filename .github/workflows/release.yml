name: Release (build & publish)

# Builds the universal macOS bundle for a tag and uploads it to that tag's GitHub
# Release, then publishes the npm packages. It runs two ways:
#
#   1. Called by release-please.yml when a release PR is merged (final release).
#      The tag + GitHub Release already exist (release-please made them, with the
#      changelog as the body); this just attaches the binaries.
#   2. Triggered directly by pushing a `vX.Y.Z-rc.N` tag by hand (release
#      candidate). No release exists yet, so tauri-action creates one, flagged as
#      a pre-release. RC tags do NOT touch the changelog or npm — they're throwaway
#      test builds.
#
# A tag with a `-` suffix is treated as a pre-release (not marked "latest", npm
# publish skipped).

on:
  workflow_call:
    inputs:
      tag:
        description: The vX.Y.Z tag to build and publish.
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - id: v
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          # Semver pre-release = a `-` suffix (v1.0.0-rc.1).
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: macos-14 # Apple-silicon runner; cross-compiles a universal binary
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Hard gate: never publish a build whose permission/security tests fail.
      - name: Frontend tests (gateway permissions)
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Rust tests (URL tiers + id confinement)
        working-directory: src-tauri
        run: cargo test

      - name: Build & upload macOS bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing & notarization ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Updater signing (emits latest.json + signature) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Uploads to the existing release for this tag (release-please made it
          # for a final; tauri-action creates one for a hand-pushed RC tag).
          # releaseBody is left unset so release-please's changelog is preserved.
          tagName: ${{ needs.setup.outputs.tag }}
          releaseName: "Mutka ${{ needs.setup.outputs.tag }}"
          releaseDraft: false
          prerelease: ${{ needs.setup.outputs.prerelease }}
          args: --target universal-apple-darwin

  # npm packages publish on FINAL releases only. release-please has already bumped
  # their package.json in lockstep, so they publish at the correct version with no
  # stamping. RC tags skip this.
  publish-sdk:
    needs: setup
    if: needs.setup.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Install SDK build deps
        working-directory: packages/module-sdk
        run: npm install --no-audit --no-fund
      - name: Build types bundle
        working-directory: packages/module-sdk
        run: npm run build
      - name: Publish to npm
        working-directory: packages/module-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-create:
    needs: setup
    if: needs.setup.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        working-directory: packages/create-module
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
